<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信息收集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family: "Microsoft YaHei",sans-serif;}
body{background:#f5f7fa;padding:20px;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.box{background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.1);max-width:600px;width:100%;padding:30px;}
.tip{text-align:center;margin-bottom:20px;}
.tip p{color:#666;margin:10px 0;line-height:1.6;}
.btn{background:#409eff;color:#fff;border:none;padding:12px 30px;border-radius:8px;font-size:16px;cursor:pointer;margin-top:10px;}
.btn:disabled{background:#ccc;cursor:not-allowed;}
.qrcode{text-align:center;margin:30px 0;}
.qrcode img{width:180px;height:180px;border:1px solid #eee;padding:5px;}
.qrcode p{margin-top:8px;color:#666;}
.download{text-align:center;margin:20px 0;}
.download a{display:inline-block;background:#67c23a;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none;margin:8px;}
</style>
</head>
<body>

<!-- 倒计时提醒页 -->
<div class="box" id="page1">
  <div class="tip">
    <h2>温馨提醒</h2>
    <p>1. 请如实填写个人信息，确保内容真实有效。</p>
    <p>2. 本次信息仅用于内部收集，严格保密。</p>
    <p>3. 填写前可下载附件查看相关说明。</p>
    <button class="btn" id="go" disabled>请阅读（<span id="time">5</span>s）</button>
  </div>
</div>

<!-- 仅保留二维码和下载链接的页面 -->
<div class="box" id="page2" style="display:none;">
  <h2 style="text-align:center;margin-bottom:20px;">信息收集</h2>

  <div class="qrcode">
    <img src="wen.jpg" alt="二维码">
    <p>扫码填写 / 查看指引</p>
  </div>

  <div class="download">
    <!-- 第一个附件下载 -->
    <a href="贵州工业职业学院校园招聘企业承诺书.docx" download>点击下载《企业承诺书》</a>
    <!-- 第二个附件下载 -->
    <a href="贵州工业职业技术学院岗位实习告知书..pdf" download>点击下载《岗位实习告知书》</a>
  </div>
</div>

<script>
let t = 5;
const time = document.getElementById('time');
const go = document.getElementById('go');
const page1 = document.getElementById('page1');
const page2 = document.getElementById('page2');

const timer = setInterval(()=>{
  t--;
  time.innerText = t;
  if(t <= 0){
    clearInterval(timer);
    go.disabled = false;
    go.innerText = "我已阅读，进入填写";
  }
},1000);

go.onclick = function(){
  page1.style.display = 'none';
  page2.style.display = 'block';
}
</script>
</body>
</html>
